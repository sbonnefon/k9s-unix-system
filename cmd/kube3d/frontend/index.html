<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K8s Unix System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Smooch+Sans:wght@300;400&display=swap" rel="stylesheet">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: #00ff88;
  }
  #canvas { display: block; width: 100vw; height: 100vh; }

  #hud {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 10;
    font-size: 14px;
    text-shadow: 0 0 8px #00ff88;
    pointer-events: none;
  }
  #hud h1 {
    font-size: 18px;
    margin-bottom: 4px;
    letter-spacing: 2px;
  }
  #hud .stats { opacity: 0.7; font-size: 12px; }

  #tooltip {
    position: fixed;
    display: none;
    background: rgba(0, 20, 10, 0.9);
    border: 1px solid #00ff88;
    padding: 10px 14px;
    font-size: 13px;
    z-index: 20;
    pointer-events: none;
    max-width: 350px;
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
  }
  #tooltip .pod-name { font-size: 15px; font-weight: bold; margin-bottom: 4px; }
  #tooltip .pod-ns { opacity: 0.7; margin-bottom: 6px; }
  #tooltip .pod-status { margin-top: 2px; }
  #tooltip .status-running { color: #00ff88; }
  #tooltip .status-pending { color: #ffcc00; }
  #tooltip .status-error { color: #ff4444; }

  #problem-filters {
    position: fixed;
    top: 58px;
    left: 16px;
    z-index: 10;
    display: flex;
    gap: 6px;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
  }
  .pf-btn {
    background: rgba(0, 20, 10, 0.7);
    border: 1px solid rgba(0, 255, 136, 0.25);
    color: rgba(0, 255, 136, 0.5);
    font-family: inherit;
    font-size: 11px;
    padding: 3px 10px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.15s ease;
  }
  .pf-btn:hover {
    border-color: rgba(0, 255, 136, 0.5);
    color: rgba(0, 255, 136, 0.7);
  }
  .pf-btn.active {
    border-color: #00ff88;
    color: #00ff88;
    background: rgba(0, 255, 136, 0.12);
    text-shadow: 0 0 6px #00ff88;
  }
  .pf-btn .pf-count {
    margin-left: 4px;
    opacity: 0.6;
  }
  .pf-btn.active .pf-count { opacity: 0.8; }

  #controls-hint {
    position: fixed;
    bottom: 16px;
    left: 16px;
    z-index: 10;
    font-size: 11px;
    opacity: 0.5;
    pointer-events: none;
  }

  /* CRT scanline overlay */
  #scanlines {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 100;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 0, 0, 0.15) 0px,
      rgba(0, 0, 0, 0.15) 1px,
      transparent 1px,
      transparent 3px
    );
  }

  #loading {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 50;
    font-size: 20px;
    text-shadow: 0 0 20px #00ff88;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* Omnisearch overlay */
  #search-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.7);
    z-index: 200;
    display: none;
    justify-content: center;
    padding-top: 15vh;
  }
  #search-overlay.active { display: flex; }

  #search-box {
    width: 520px;
    max-height: 60vh;
    display: flex;
    flex-direction: column;
  }

  #search-input-wrap {
    position: relative;
    background: rgba(0, 20, 10, 0.95);
  }

  #search-input {
    width: 100%;
    background: transparent;
    border: 1px solid #00ff88;
    color: #00ff88;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    font-size: 16px;
    padding: 12px 16px;
    outline: none;
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
    position: relative;
    z-index: 1;
  }
  #search-input::placeholder { color: rgba(0, 255, 136, 0.35); }

  #search-results {
    overflow-y: auto;
    background: rgba(0, 20, 10, 0.95);
    border: 1px solid #00ff88;
    border-top: none;
    max-height: calc(60vh - 44px);
  }
  #search-results:empty { display: none; }

  #search-hint {
    background: rgba(0, 20, 10, 0.95);
    border: 1px solid rgba(0, 255, 136, 0.3);
    border-top: none;
    padding: 6px 16px;
    font-size: 11px;
    color: rgba(0, 255, 136, 0.4);
    display: none;
    line-spacing: 1.4;
  }
  #search-hint.active { display: block; }
  #search-hint kbd {
    background: rgba(0, 255, 136, 0.1);
    border: 1px solid rgba(0, 255, 136, 0.25);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 10px;
  }

  #search-completions {
    background: rgba(0, 20, 10, 0.95);
    border: 1px solid rgba(0, 255, 136, 0.5);
    border-top: none;
    max-height: 180px;
    overflow-y: auto;
    display: none;
  }
  #search-completions.active { display: block; }
  .sc-item {
    padding: 5px 16px;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: baseline;
    gap: 10px;
    color: #00ff88;
  }
  .sc-item.selected {
    background: rgba(0, 255, 136, 0.15);
  }
  .sc-item:hover {
    background: rgba(0, 255, 136, 0.1);
  }
  .sc-item .sc-value { opacity: 0.9; }
  .sc-item .sc-label {
    font-size: 10px;
    opacity: 0.4;
    margin-left: auto;
  }
  #search-ghost {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    padding: 12px 16px;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    font-size: 16px;
    color: rgba(0, 255, 136, 0.2);
    pointer-events: none;
    white-space: pre;
    overflow: hidden;
  }

  .search-result {
    padding: 8px 16px;
    cursor: pointer;
    display: flex;
    align-items: baseline;
    gap: 10px;
    border-bottom: 1px solid rgba(0, 255, 136, 0.1);
  }
  .search-result:last-child { border-bottom: none; }
  .search-result:hover, .search-result.selected {
    background: rgba(0, 255, 136, 0.12);
  }
  .search-result .sr-kind {
    font-size: 10px;
    opacity: 0.5;
    min-width: 70px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .search-result .sr-name { font-size: 14px; }
  .search-result .sr-detail {
    font-size: 11px;
    opacity: 0.5;
    margin-left: auto;
  }
  .search-result .sr-status {
    font-size: 11px;
    margin-left: 6px;
  }

  /* Detail side panel */
  #detail-panel {
    position: fixed;
    top: 0;
    right: 0;
    width: 340px;
    height: 100%;
    background: rgba(0, 12, 6, 0.92);
    border-left: 1px solid rgba(0, 255, 136, 0.3);
    z-index: 15;
    font-size: 13px;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.25s ease-out;
    box-shadow: -4px 0 30px rgba(0, 255, 136, 0.08);
    scrollbar-width: thin;
    scrollbar-color: rgba(0, 255, 136, 0.2) transparent;
  }
  #detail-panel.open { transform: translateX(0); }
  #detail-panel::-webkit-scrollbar { width: 4px; }
  #detail-panel::-webkit-scrollbar-thumb { background: rgba(0, 255, 136, 0.2); }

  .dp-header {
    padding: 16px;
    border-bottom: 1px solid rgba(0, 255, 136, 0.15);
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .dp-header-text { flex: 1; min-width: 0; }
  .dp-kind {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0.5;
    margin-bottom: 4px;
  }
  .dp-name {
    font-size: 16px;
    font-weight: bold;
    word-break: break-all;
    text-shadow: 0 0 8px #00ff88;
  }
  .dp-close {
    background: none;
    border: 1px solid rgba(0, 255, 136, 0.3);
    color: #00ff88;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    font-size: 14px;
    cursor: pointer;
    padding: 2px 8px;
    opacity: 0.6;
    flex-shrink: 0;
  }
  .dp-close:hover { opacity: 1; background: rgba(0, 255, 136, 0.1); }

  .dp-section {
    padding: 12px 16px;
    border-bottom: 1px solid rgba(0, 255, 136, 0.08);
  }
  .dp-section-title {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0.4;
    margin-bottom: 8px;
  }

  .dp-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 3px 0;
  }
  .dp-label { opacity: 0.5; }
  .dp-value { text-align: right; word-break: break-all; max-width: 60%; }

  .dp-status {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 2px;
    font-size: 12px;
    font-weight: bold;
  }
  .dp-status-ok { color: #00ff88; border: 1px solid rgba(0, 255, 136, 0.3); }
  .dp-status-warn { color: #ffcc00; border: 1px solid rgba(255, 204, 0, 0.3); }
  .dp-status-error { color: #ff4444; border: 1px solid rgba(255, 68, 68, 0.3); }

  .dp-labels-list {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .dp-label-tag {
    font-size: 11px;
    padding: 2px 6px;
    background: rgba(0, 255, 136, 0.08);
    border: 1px solid rgba(0, 255, 136, 0.15);
    border-radius: 2px;
    word-break: break-all;
  }

  .dp-svc-item {
    padding: 6px 0;
    border-bottom: 1px solid rgba(0, 255, 136, 0.06);
  }
  .dp-svc-item:last-child { border-bottom: none; }
  .dp-svc-name { font-weight: bold; margin-bottom: 2px; }
  .dp-svc-detail { font-size: 11px; opacity: 0.5; }

  .dp-ingress-rule {
    padding: 4px 0;
    font-size: 12px;
  }
  .dp-ingress-host { opacity: 0.7; }
  .dp-ingress-path { padding-left: 12px; }
</style>
</head>
<body>
<div id="scanlines"></div>
<div id="hud">
  <h1>K8S UNIX SYSTEM</h1>
  <div class="stats">
    <span id="node-count">0</span> NODES &middot;
    <span id="ns-count">0</span> NAMESPACES &middot;
    <span id="workload-count">0</span> WORKLOADS &middot;
    <span id="pod-count">0</span> PODS &middot;
    <span id="svc-count">0</span> SERVICES &middot;
    <span id="ingress-count">0</span> INGRESSES &middot;
    <span id="warning-count">0</span> WARNINGS
  </div>
</div>
<div id="tooltip"></div>
<div id="problem-filters">
  <button class="pf-btn" data-filter="unhealthy">UNHEALTHY<span class="pf-count"></span></button>
  <button class="pf-btn" data-filter="crashloop">CRASHLOOP<span class="pf-count"></span></button>
  <button class="pf-btn" data-filter="unscheduled">PENDING<span class="pf-count"></span></button>
  <button class="pf-btn" data-filter="warnings">WARNINGS<span class="pf-count"></span></button>
</div>
<div id="detail-panel"></div>
<div id="controls-hint">WASD/Arrows: Move &middot; Mouse: Look &middot; Shift: Fast &middot; Space/Ctrl: Up/Down &middot; Click: Lock cursor &middot; Esc: Unlock &middot; E: Eagle Eye &middot; F: Problem Filter</div>
<div id="loading">CONNECTING TO CLUSTER...</div>
<div id="search-overlay">
  <div id="search-box">
    <div id="search-input-wrap">
      <input id="search-input" type="text" placeholder="Search... (kind: ns: status: node: -l key=val /regex/)" autocomplete="off" spellcheck="false">
      <div id="search-ghost"></div>
    </div>
    <div id="search-completions"></div>
    <div id="search-hint"></div>
    <div id="search-results"></div>
  </div>
</div>
<canvas id="canvas"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module" src="app.js"></script>
</body>
</html>
